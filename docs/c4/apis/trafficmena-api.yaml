components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Representative session cookie used by the authenticated web experience.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF token header required for mutating API requests.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RegId:
      name: regId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SkillId:
      name: skillId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but insufficient privileges
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse:
      description: Error response envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    GenericStatus:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
        data:
          type: object
          additionalProperties: true
      required: [error]
    MutationResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
      additionalProperties: true
    GenericObject:
      type: object
      additionalProperties: true
    EntityResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
      additionalProperties: true
    EntityListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      additionalProperties: true
    SessionEnvelope:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            role:
              type: string
          additionalProperties: true
        session:
          type: object
          additionalProperties: true
      additionalProperties: true
    AuthOtpRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        turnstileToken:
          type: string
      required: [email]
      additionalProperties: true
    AuthOtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
      required: [email, otp]
      additionalProperties: true
    InvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        customMessage:
          type: string
      required: [email]
      additionalProperties: false
    InvitationAcceptRequest:
      type: object
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
      additionalProperties: true
    CsvPayload:
      type: object
      properties:
        csv:
          type: string
      required: [csv]
      additionalProperties: false
    EventWriteRequest:
      type: object
      properties:
        title:
          type: string
        eventDescription:
          type: string
        date:
          type: string
          format: date-time
        location:
          type: string
        locationUrl:
          type: string
          format: uri
        meetingLink:
          type: string
          format: uri
        maxAttendees:
          type: integer
        imageUrl:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
        eventType:
          type: string
        priceInCents:
          type: integer
      additionalProperties: true
    TrackWriteRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        isPublished:
          type: boolean
        priceInCents:
          type: integer
        location:
          type: string
        locationUrl:
          type: string
          format: uri
      additionalProperties: true
    LibraryAssetWriteRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        fileType:
          type: string
        fileUrl:
          type: string
          format: uri
        videoUrl:
          type: string
          format: uri
        documentUrl:
          type: string
          format: uri
        embedUrl:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
        isPublic:
          type: boolean
        isPremium:
          type: boolean
      additionalProperties: true
    SeriesWriteRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        isPublished:
          type: boolean
      additionalProperties: true
    ReorderRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
        assetIds:
          type: array
          items:
            type: string
        eventIds:
          type: array
          items:
            type: string
      additionalProperties: true
    GrantRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
      additionalProperties: true
    GrantBulkRequest:
      type: object
      properties:
        csv:
          type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    SkillSelectionRequest:
      type: object
      properties:
        skillId:
          type: string
          format: uuid
      required: [skillId]
      additionalProperties: false
    SettingsPatchRequest:
      type: object
      properties:
        inviteOnly:
          type: boolean
        subscriptionEnabled:
          type: boolean
        subscriptionDiscountPercent:
          type: number
      additionalProperties: true
    CheckoutRequest:
      type: object
      properties:
        itemType:
          type: string
          enum: [event, track, subscription]
        itemId:
          type: string
          format: uuid
        paymentMethodId:
          type: integer
        promoCode:
          type: string
      required: [itemType, paymentMethodId]
      additionalProperties: true
    CheckoutResponse:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        invoiceId:
          type: integer
        invoiceKey:
          type: string
        redirectTo:
          type: string
          format: uri
        status:
          type: string
      additionalProperties: true
    VerifyPaymentRequest:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        invoiceId:
          type: integer
      additionalProperties: true
    PaymentStatus:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        paymentStatus:
          type: string
        invoiceId:
          type: integer
        invoiceKey:
          type: string
        paidAt:
          type: string
          format: date-time
      additionalProperties: true
    PricePreview:
      type: object
      properties:
        originalPriceInCents:
          type: integer
        finalPriceInCents:
          type: integer
        discountInCents:
          type: integer
        appliedPromoCode:
          type: string
      additionalProperties: true
    PromoCodeWriteRequest:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        discountPercent:
          type: number
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        targetType:
          type: string
        targetId:
          type: string
      additionalProperties: true
    UploadResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
        path:
          type: string
        contentType:
          type: string
      additionalProperties: true
    PaymentMethod:
      type: object
      properties:
        paymentId:
          type: integer
        name_en:
          type: string
        name_ar:
          type: string
        redirect:
          type: string
        logo:
          type: string
      additionalProperties: true
