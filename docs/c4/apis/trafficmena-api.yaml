            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/invitations/single:
    post:
      tags: [Invitations]
      summary: Send a single invitation
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
