  /api/tracks/{id}/attendees:
    get:
      tags: [Tracks]
      summary: List track attendees
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Attendee list
