    put:
      tags: [Events]
      summary: Update an event
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventWriteRequest'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
    delete:
      tags: [Events]
      summary: Delete an event
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
  /api/events/{id}/attendees:
    get:
      tags: [Events]
      summary: List event attendees
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Id'
