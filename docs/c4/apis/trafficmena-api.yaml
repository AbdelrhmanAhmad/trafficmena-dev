          description: Track detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
    put:
      tags: [Tracks]
      summary: Update a track
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackWriteRequest'
      responses:
        '200':
          description: Track updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
    delete:
      tags: [Tracks]
      summary: Delete a track
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Track deleted
          content:
            application/json:
              schema:
