          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/invitations/bulk:
    post:
      tags: [Invitations]
      summary: Send invitations from CSV input
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
          application/json:
            schema:
              $ref: '#/components/schemas/CsvPayload'
      responses:
