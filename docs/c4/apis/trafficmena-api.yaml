openapi: 3.1.0
info:
  title: TrafficMENA API
  version: 0.2.0
  description: >
    Architecture-level OpenAPI specification for the current TrafficMENA backend.
    It is derived from the Hono route surface in `server/src/routes` and is intended
    to document the container interface, auth model, and high-level request/response
    shapes rather than serve as a generated source-of-truth contract.
servers:
  - url: /
    description: Same-origin deployment behind the web application
  - url: http://localhost:3001
    description: Local development server
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Skills
  - name: Invitations
  - name: Events
  - name: Tracks
  - name: Library
  - name: Series
  - name: Series Grants
  - name: Subscriptions
  - name: Subscription Grants
  - name: Settings
  - name: Promo Codes
  - name: Payments
  - name: Uploads
  - name: Metrics
paths:
  /:
    get:
      tags: [Health]
      summary: Root liveness probe
      security: []
      responses:
        '200':
          description: Service is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatus'
  /health:
    get:
      tags: [Health]
      summary: Application health probe
      security: []
      responses:
        '200':
          description: Service health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatus'
  /api/health:
    get:
      tags: [Health]
      summary: API health probe
      security: []
      responses:
        '200':
          description: API health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatus'
  /db/health:
    get:
      tags: [Health]
      summary: Database health probe
      security: []
      responses:
        '200':
          description: Database is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatus'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/otp/request:
    post:
      tags: [Auth]
      summary: Request an OTP code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthOtpRequest'
      responses:
        '200':
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and create a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthOtpVerifyRequest'
      responses:
        '200':
          description: Session established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current session
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/session:
    get:
      tags: [Auth]
      summary: Get the current authenticated session
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'

  /api/admin/metrics/overview:
    get:
      tags: [Metrics]
      summary: Get admin overview metrics
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Aggregated dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/invitations:
